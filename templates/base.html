<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Directorio de Mascotas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'mascotas:lista_mascotas' %}">🐾 Mascotas Perdidas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item d-flex align-items-center text-white me-3">
                            {% if user.avatar %}
                                <img src="{{ user.avatar.url }}" alt="Avatar" class="rounded-circle me-2 border border-light" style="width: 32px; height: 32px; object-fit: cover;">
                            {% endif %}
                            <span>Hola, {{ user.first_name|default:user.email }}</span>
                        </li>
                        <li class="nav-item me-2">
                            <a class="nav-link btn btn-success text-white px-3" href="{% url 'mascotas:crear_mascota' %}">Reportar Mascota</a>
                        </li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'usuarios:logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm mt-1">Cerrar Sesión</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'usuarios:login' %}">Iniciar Sesión</a>
                        </li>
                        <li class="nav-item ms-2">
                            <a class="nav-link btn btn-outline-light px-3" href="{% url 'usuarios:registro' %}">Registrarse</a>
                        </li>
                    {% endif %}

                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock content %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
