{% extends 'base.html' %}
{% block title %}Nueva Contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-5">
        <div class="card p-4 p-sm-5 shadow-sm border-0 text-center">
            <i class="bi bi-key-fill text-success mb-3" style="font-size: 3rem;"></i>
            <h3 class="fw-bold">Nueva Contraseña</h3>
            <p class="text-muted small">Escribe tu nueva contraseña de acceso.</p>
            
            <form method="post" class="mt-4 text-start">
                {% csrf_token %}
                <label class="form-label text-muted fw-bold mt-2">Nueva Contraseña</label>
                <input type="password" name="password" class="form-control" required minlength="8">
                
                <label class="form-label text-muted fw-bold mt-3">Confirmar Contraseña</label>
                <input type="password" name="password_confirm" class="form-control" required minlength="8">
                
                <button type="submit" class="btn btn-google-success btn-lg w-100 mt-4">Guardar Contraseña</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
