{% extends 'base.html' %}
{% block title %}Recuperar Contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-5">
        <div class="card p-4 p-sm-5 shadow-sm border-0 text-center">
            <i class="bi bi-envelope-at-fill text-primary mb-3" style="font-size: 3rem;"></i>
            <h3 class="fw-bold">Recuperar Acceso</h3>
            <p class="text-muted small">Ingresa tu correo y te enviaremos un código para restablecerla.</p>
            
            <form method="post" class="mt-4 text-start">
                {% csrf_token %}
                <label class="form-label text-muted fw-bold">Correo electrónico</label>
                <input type="email" name="email" class="form-control form-control-lg" required>
                <button type="submit" class="btn btn-google-primary btn-lg w-100 mt-4">Enviar Código</button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'usuarios:login' %}" class="text-decoration-none fw-bold text-muted">Regresar al Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
