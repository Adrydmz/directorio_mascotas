{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} rounded-4 border-0 shadow-sm" role="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <div class="card p-4 p-sm-5 shadow-sm border-0 text-center">
            <i class="bi bi-shield-lock-fill text-primary mb-3" style="font-size: 3rem;"></i>
            <h3 class="fw-bold">{{ titulo }}</h3>
            <p class="text-muted small">Ingresa el código de 6 dígitos que enviamos a tu correo.</p>
            
            <form method="post" class="mt-4">
                {% csrf_token %}
                <input type="text" name="codigo" class="form-control form-control-lg text-center fw-bold fs-4" placeholder="000000" maxlength="6" required>
                <button type="submit" class="btn btn-google-primary btn-lg w-100 mt-4">Validar Código</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
