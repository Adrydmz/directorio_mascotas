{% extends 'base.html' %}
{% block title %}Crear Cuenta{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 p-sm-5 shadow-sm border-0">
            <div class="text-center mb-4">
                <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                    <i class="bi bi-person-plus-fill text-success fs-2"></i>
                </div>
                <h3 class="fw-bold">Crear una Cuenta</h3>
                <p class="text-muted small">Únete al Directorio de Mascotas Perdidas</p>
            </div>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-google-success btn-lg">Registrarme</button>
                </div>
            </form>
            <hr class="my-4 text-muted opacity-25">
            <div class="text-center">
                <span class="text-muted small">¿Ya tienes una cuenta?</span> 
                <a href="{% url 'usuarios:login' %}" class="text-decoration-none fw-bold text-success ms-1">Inicia sesión</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
