{% extends 'base.html' %}
{% block title %}Reportar Mascota{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-8 col-lg-7">
        <div class="card p-4 p-sm-5 border-0 shadow-sm">
            <div class="d-flex align-items-center gap-3 mb-4 pb-3" style="border-bottom: 1px solid var(--border-color);">
                <i class="bi bi-pencil-square fs-3 text-primary"></i>
                <h3 class="fw-bold mb-0">Detalles de la Mascota</h3>
            </div>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-end gap-3 mt-5">
                    <a href="{% url 'mascotas:lista_mascotas' %}" class="btn btn-google-outline">Cancelar</a>
                    <button type="submit" class="btn btn-google-primary">Guardar Registro</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
